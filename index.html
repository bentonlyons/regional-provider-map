@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans','Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a}
#hdr{background:linear-gradient(135deg,#BE0000,#8a0000);padding:14px 22px;display:flex;align-items:center;gap:14px;z-index:1000;position:relative}
#hdr .logo{width:38px;height:38px;border-radius:7px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}
#hdr h1{color:#fff;font-size:18px;font-weight:700;letter-spacing:-.01em}
#hdr .sub{color:rgba(255,255,255,.65);font-size:11.5px;margin-top:1px}
#hdr .stats{margin-left:auto;display:flex;gap:20px;color:rgba(255,255,255,.85);font-size:13px;flex-shrink:0}
#hdr .stats strong{font-size:17px;color:#fff}
#hdr .stats .lbl{font-size:11px;opacity:.65}
#ctl{background:#fff;border-bottom:1px solid #e0ddd8;padding:10px 22px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;z-index:1000;position:relative}
.fl{font-size:10.5px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-right:4px}
select#specSel{padding:6px 10px;border-radius:6px;border:1px solid #ddd;font-size:12px;font-family:inherit;font-weight:600;color:#333;min-width:220px;cursor:pointer;background:#fff;transition:border-color .15s}
select#specSel:focus{outline:none;border-color:#BE0000}
#specLabel{font-size:12px;color:#BE0000;font-weight:700;margin-left:4px;display:none}
#wrap{display:flex;height:calc(100vh - 100px)}
#map{flex:1;z-index:1}
#sb{width:380px;flex-shrink:0;background:#fff;border-left:1px solid #e0ddd8;overflow-y:auto;z-index:1}
.ph{padding:16px 20px;color:#fff}
.ph h2{font-size:17px;font-weight:700}
.ph .ml{font-size:11px;opacity:.7;margin-top:2px}
.ph .ps{display:flex;gap:18px;margin-top:10px}
.ph .ps .n{font-size:22px;font-weight:700}
.ph .ps .l{font-size:10px;opacity:.6}
.psec{padding:12px 20px;border-bottom:1px solid #f0eeeb}
.psec h3{font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.sbar{display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:11.5px;cursor:pointer;padding:2px 0;border-radius:4px;transition:background .1s}
.sbar:hover{background:#f8f7f5}
.sbar .sn{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#444}
.sbar .sb{flex:1;height:5px;border-radius:3px;background:#f0f0f0;overflow:hidden;max-width:80px}
.sbar .sbf{height:100%;border-radius:3px}
.sbar .sv{font-weight:700;min-width:24px;text-align:right;font-size:12px}
.spec-group{border-bottom:1px solid #f0eeeb}
.spec-hdr{padding:10px 20px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;transition:background .1s}
.spec-hdr:hover{background:#f8f7f5}
.spec-hdr .arrow{font-size:10px;color:#bbb;transition:transform .2s;width:14px}
.spec-hdr .arrow.open{transform:rotate(90deg)}
.spec-hdr .sp-name{font-size:12.5px;font-weight:700;color:#333;flex:1}
.spec-hdr .sp-cnt{font-size:11px;color:#999;font-weight:600}
.spec-body{display:none;padding:0 20px 10px 20px}
.spec-body.show{display:block}
.clinic-name{font-size:10.5px;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:.04em;padding:6px 0 3px 0;border-bottom:1px solid #f5f3f0;margin-bottom:2px}
.clinic-name.unspec{color:#bbb;font-style:italic;text-transform:none}
.prov-row{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:11.5px}
.prov-row .vcheck{width:14px;height:14px;border-radius:3px;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prov-row .vcheck.on{background:#0F5C3C;border-color:#0F5C3C}
.prov-row .vcheck.on svg{display:block}
.prov-row .vcheck svg{display:none}
.prov-row .bd{font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;flex-shrink:0}
.bd-m{background:#e8f5e9;color:#2e7d32}.bd-a{background:#fff3e0;color:#e65100}.bd-o{background:#f5f5f5;color:#999}
.prov-row .pnm{color:#444;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{display:flex;align-items:center;justify-content:center;height:100%;text-align:center;padding:40px;color:#999;font-size:13px;line-height:1.6}
.val-legend{display:flex;gap:12px;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.2)}
.val-legend .vl-item{display:flex;align-items:center;gap:4px;font-size:10px;opacity:.75}
.leaflet-popup-content-wrapper{border-radius:8px!important;box-shadow:0 3px 12px rgba(0,0,0,.12)!important}
.leaflet-popup-content{margin:10px 14px!important;font-family:'DM Sans',system-ui,sans-serif!important}
.pc{font-size:13px;font-weight:700}.pm{font-size:10.5px;color:#888;margin-top:1px}
.pn{display:flex;gap:12px;margin-top:6px}.pn div{text-align:center}
.pn .v{font-size:14px;font-weight:700}.pn .k{font-size:9px;color:#999}
@media(max-width:900px){#wrap{flex-direction:column;height:auto}#map{height:50vh}#sb{width:100%;height:50vh;border-left:none;border-top:1px solid #e0ddd8}#hdr .stats{display:none}}
</style>
</head>

function gc(city){if(fSp==='ALL')return city.n;let s=city.ss[fSp];return s?s.n:0;}

if(fSp==='ALL'){for(let sp in city.ss){md+=city.ss[sp].md;ap+=city.ss[sp].app;}city.ps.forEach(p=>{if(p.v)vl++});}
else{let s=city.ss[fSp];if(s){md=s.md;ap=s.app;}city.ps.filter(p=>p.sp===fSp).forEach(p=>{if(p.v)vl++});}
ci.bindPopup('<div class="pc" style="color:'+col+'">'+city.c+', '+city.st+'</div><div class="pm">'+(fSp==='ALL'?city.mk.join(' &middot; '):fSp)+'</div><div class="pn"><div><div class="v">'+total+'</div><div class="k">Total</div></div><div><div class="v">'+md+'</div><div class="k">MD/DO</div></div><div><div class="v">'+ap+'</div><div class="k">APP</div></div><div><div class="v">'+vl+'</div><div class="k">Validated</div></div></div><div style="font-size:10px;color:#BE0000;margin-top:6px;font-weight:600">Click for details &rarr;</div>',{closeButton:false,maxWidth:220}).openPopup();
});
ci.on('mouseout',function(){this.setStyle({fillOpacity:sel&&sel.c===city.c?.95:.65,weight:2});ci.closePopup();});
mk.push(ci);
});
}
function setSpec(val){
fSp=val;sel=null;
document.getElementById('sb').innerHTML='<div class="empty">&#x1f5fa;&#xfe0f;<br>Click any city marker to<br>explore providers by specialty</div>';
const lbl=document.getElementById('specLabel');
if(val!=='ALL'){lbl.textContent='Showing: '+val;lbl.style.display='inline';}else{lbl.style.display='none';}
render();upSt();
}
function selCity(city){
sel=city;const sb=document.getElementById('sb');const col=SC[city.st]?.f||'#666';
let specsToShow=[],provsPool=city.ps;
if(fSp!=='ALL'){let s=city.ss[fSp];if(s)specsToShow=[{name:fSp,...s}];provsPool=city.ps.filter(p=>p.sp===fSp);}
else{for(let sp in city.ss)specsToShow.push({name:sp,...city.ss[sp]});specsToShow.sort((a,b)=>b.n-a.n);}
let md=0,ap=0,vl=0;
specsToShow.forEach(s=>{md+=s.md;ap+=s.app;});provsPool.forEach(p=>{if(p.v)vl++;});
let totalShown=specsToShow.reduce((a,s)=>a+s.n,0);
let sbarsHtml='';
if(fSp==='ALL'){const mx=specsToShow.length?specsToShow[0].n:1;
sbarsHtml='<div class="psec"><h3>Specialties ('+specsToShow.length+')</h3>'
+specsToShow.map(s=>'<div class="sbar" onclick="scrollToSpec(\''+s.name.replace(/'/g,"\\'")+'\')"><span class="sn">'+s.name+'</span><div class="sb"><div class="sbf" style="width:'+Math.round(s.n/mx*100)+'%;background:'+col+'"></div></div><span class="sv" style="color:'+col+'">'+s.n+'</span></div>').join('')+'</div>';}
let specsHtml='';
specsToShow.forEach((spec,idx)=>{
let provs=city.ps.filter(p=>p.sp===spec.name);
let clinics={};provs.forEach(p=>{let k=p.pr||'_unspecified';if(!clinics[k])clinics[k]=[];clinics[k].push(p);});
let clinicKeys=Object.keys(clinics).sort((a,b)=>{if(a==='_unspecified')return 1;if(b==='_unspecified')return -1;return a.toLowerCase().localeCompare(b.toLowerCase());});
let clinicsHtml=clinicKeys.map(k=>{
let isU=k==='_unspecified';
return '<div class="clinic-name'+(isU?' unspec':'')+'">'+(isU?'Unspecified':k)+'</div>'
+clinics[k].map(p=>{let cls=p.pt==='MD'?'bd-m':p.pt==='APP'?'bd-a':'bd-o';
return '<div class="prov-row"><div class="vcheck'+(p.v?' on':'')+'"><svg width="10" height="10" viewBox="0 0 16 16" fill="white"><path d="M13.5 4.5l-7 7L3 8" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="bd '+cls+'">'+p.tl+'</span><span class="pnm">'+p.nm+'</span></div>';}).join('');
}).join('');
if(fSp!=='ALL'){specsHtml+='<div style="padding:12px 20px"><h3 style="font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">'+spec.name+' Providers ('+spec.n+')</h3>'+clinicsHtml+'</div>';}
else{let ao=idx===0;specsHtml+='<div class="spec-group" id="sg-'+spec.name.replace(/[^a-zA-Z0-9]/g,'_')+'"><div class="spec-hdr" onclick="toggleSpec(this)"><span class="arrow'+(ao?' open':'')+'">&#x25b6;</span><span class="sp-name">'+spec.name+'</span><span class="sp-cnt">'+spec.n+'</span></div><div class="spec-body'+(ao?' show':'')+'">'+clinicsHtml+'</div></div>';}
});
sb.innerHTML='<div class="ph" style="background:'+col+'"><h2>'+city.c+', '+city.st+'</h2><div class="ml">'+city.mk.join(' &middot; ')+(fSp!=='ALL'?' &mdash; '+fSp:'')+'</div><div class="ps"><div><div class="n">'+totalShown+'</div><div class="l">'+(fSp==='ALL'?'Total':fSp)+'</div></div><div><div class="n">'+md+'</div><div class="l">MD/DO</div></div><div><div class="n">'+ap+'</div><div class="l">APP</div></div><div><div class="n">'+vl+'</div><div class="l">Validated</div></div></div><div class="val-legend"><div class="vl-item"><div class="vcheck on" style="width:12px;height:12px;border-radius:2px;background:#0F5C3C;border:1.5px solid #0F5C3C;display:flex;align-items:center;justify-content:center"><svg width="8" height="8" viewBox="0 0 16 16"><path d="M13.5 4.5l-7 7L3 8" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>Validated</div><div class="vl-item"><div style="width:12px;height:12px;border-radius:2px;border:1.5px solid #ccc"></div>Not yet validated</div></div></div>'
+sbarsHtml+specsHtml;
render();
}
function toggleSpec(el){const a=el.querySelector('.arrow');const b=el.nextElementSibling;a.classList.toggle('open');b.classList.toggle('show');}
function scrollToSpec(specName){const id='sg-'+specName.replace(/[^a-zA-Z0-9]/g,'_');const el=document.getElementById(id);if(el){const a=el.querySelector('.arrow');const b=el.querySelector('.spec-body');if(!b.classList.contains('show')){a.classList.add('open');b.classList.add('show');}el.scrollIntoView({behavior:'smooth',block:'start'});}}
function upSt(){
let tot=0,mds=0,apps=0,vl=0,cities=0;
D.forEach(c=>{let cn=gc(c);if(cn>0)cities++;
if(fSp==='ALL'){tot+=c.n;for(let sp in c.ss){mds+=c.ss[sp].md;apps+=c.ss[sp].app;}c.ps.forEach(p=>{if(p.v)vl++});}
else{let s=c.ss[fSp];if(s){tot+=s.n;mds+=s.md;apps+=s.app;}c.ps.filter(p=>p.sp===fSp).forEach(p=>{if(p.v)vl++});}
});
document.getElementById('st').innerHTML='<span><strong>'+tot+'</strong> <span class="lbl">providers</span></span><span><strong>'+mds+'</strong> <span class="lbl">MD/DO</span></span><span><strong>'+apps+'</strong> <span class="lbl">APP</span></span><span><strong>'+vl+'</strong> <span class="lbl">validated</span></span><span><strong>'+cities+'</strong> <span class="lbl">cities</span></span>';
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body></html>
